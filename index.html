<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>KaamWala AI — User App</title>

  <!-- Tailwind via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">

  <style>
    html, body, #root { margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, system-ui, sans-serif;
      background: #E2E8F0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .font-display { font-family: 'Plus Jakarta Sans', 'Inter', sans-serif; letter-spacing: -0.01em; }

    /* iOS frame inner: make sure absolutely positioned status bar stays above app bar.
       The IOSDevice already renders a black dynamic island + status bar in absolute layer. */

    /* Custom scrollbar inside the chat */
    .overflow-y-auto::-webkit-scrollbar { width: 0; }

    /* Tailwind ring won't render on focus inputs without it; nothing extra needed */

    /* Slide transitions for screen router */
    @keyframes kw-slide-in-right {
      from { transform: translateX(100%); opacity: 0.6; }
      to   { transform: translateX(0);     opacity: 1;   }
    }
    @keyframes kw-slide-in-left {
      from { transform: translateX(-100%); opacity: 0.6; }
      to   { transform: translateX(0);      opacity: 1;   }
    }
    @keyframes kw-slide-out-left {
      from { transform: translateX(0);    opacity: 1; }
      to   { transform: translateX(-30%); opacity: 0; }
    }
    @keyframes kw-slide-out-right {
      from { transform: translateX(0);   opacity: 1; }
      to   { transform: translateX(30%); opacity: 0; }
    }
    @keyframes kw-sheet-up {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    @keyframes kw-slide-in-bottom {
      from { transform: translateY(100%); opacity: 0.6; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    /* Style range slider thumb */
    input[type="range"] { -webkit-appearance: none; height: 4px; border-radius: 99px; background: #E2E8F0; outline: none; }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 22px; height: 22px; border-radius: 50%;
      background: currentColor; cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.18);
    }
  </style>

  <!-- React + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="ios-frame.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="lib.jsx"></script>
  <script type="text/babel" src="auth.jsx"></script>
  <script type="text/babel" src="provider.jsx"></script>
  <script type="text/babel" src="app.jsx"></script>
</body>
</html>
